name: 2. Laravel Tests

on:
  workflow_run:
    workflows: ["1. Code Quality"]
    types:
      - completed

jobs:
  laravel-tests:
    # Only run if the previous workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: testing
          POSTGRES_DB: testing
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
          - 5432/tcp
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - uses: actions/checkout@main
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Copy config
        run: |
          php -r "copy('.env.testing', '.env');"
          sed -i 's/testdb.docker.dev/127.0.0.1/' .env.testing

      - name: Install Dependencies
        env:
          COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ secrets.COMPOSER_AUTH }}"} }'
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: NPM install & build
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"

      - run: npm install
      - run: npm run build
      - run: npm prune --production
      - run: rm -Rf node_modules

      - name: Generate key
        run: php artisan key:generate

      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Migrate
        run: |
          php artisan config:clear
          php artisan migrate --env=testing

      - name: Execute tests defined in CI (Unit and Feature tests) via Pest tests
        run: |
          pwd
          ls -la
          vendor/bin/pest --no-coverage

      - name: Archive Test Results
        uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: test-results
          path: |
            tests/_output/debug/
            storage/logs/
